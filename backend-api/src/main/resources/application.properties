#Server configuration
server.port= 8080

# Database configuration
# docker run -d --name mysql-db -p 3306:3306 -e MYSQL_ROOT_PASSWORD=localdev -e MYSQL_DATABASE=url_shortener_db mysql:latest
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener_db
spring.datasource.username=root
spring.datasource.password=localdev

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Application name
spring.application.name=spring-boot-backend

# Logging level config (E.g. INFO, DEBUG, WARN, ERROR)
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=INFO
