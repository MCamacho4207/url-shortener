version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=host.docker.internal
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend-ui/Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
